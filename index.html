<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class IX Revision - FA1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:            #111111;
    --bg-alt:        #171717;
    --surface:       #1E1E1E;
    --surface-hi:    #262626;
    --border:        #333333;
    --text:          #E5E5E5;
    --muted:         #888888;
    --mono:          'JetBrains Mono', monospace;
    --display:       'Outfit', sans-serif;
    --body:          'Outfit', sans-serif;

    --mint:          #00E5FF;
    --mint-dim:      rgba(0, 229, 255, 0.12);
    --amber:         #FBBF24;
    --amber-dim:     rgba(251, 191, 36, 0.12);
    --coral:         #F87171;
    --coral-dim:     rgba(248, 113, 113, 0.12);
    --violet:        #B388FF;
  }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    background: var(--bg);
    color:var(--text);
    font-family:var(--body);
    line-height:1.5;
    padding-bottom:120px;
  }

  ::selection{ background:var(--mint); color:#111111; }

  /* ---------- Hero ---------- */
  .hero{
    max-width:960px;
    margin:0 auto;
    padding:56px 24px 20px;
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:13px;
    color:var(--mint);
    letter-spacing:.06em;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .eyebrow::before{ content:"//"; color:var(--muted); }
  h1{
    font-family:var(--display);
    font-weight:700;
    font-size:clamp(32px, 5vw, 52px);
    line-height:1.08;
    margin:14px 0 10px;
    letter-spacing:-0.01em;
  }
  h1 span{ color:var(--mint); }
  .hero p.sub{
    color:var(--muted);
    font-size:16px;
    max-width:58ch;
    margin:0 0 26px;
  }

  /* compile progress */
  .compile-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:18px;
    padding:20px 22px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .compile-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    font-family:var(--mono);
    font-size:13px;
    color:var(--muted);
  }
  #compileMsg{ color:var(--text); font-weight:500; }
  #compileCount{ color:var(--mint); font-weight:600; }
  .track{
    height:10px;
    border-radius:999px;
    background:#0B0F1D;
    border:1px solid var(--border);
    overflow:hidden;
  }
  .track-fill{
    height:100%;
    width:0%;
    border-radius:999px;
    background:linear-gradient(90deg, var(--mint), var(--violet));
    transition:width .4s ease;
  }

  /* ---------- Tabs ---------- */
  .tab-bar{
    max-width:960px;
    margin:30px auto 0;
    padding:0 24px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .tab{
    font-family:var(--mono);
    font-size:13.5px;
    font-weight:500;
    color:var(--muted);
    background:var(--surface);
    border:1px solid var(--border);
    border-bottom:none;
    padding:11px 18px 10px;
    border-radius:12px 12px 0 0;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    transition:color .15s, background .15s;
  }
  .tab .n{
    background:var(--bg-alt);
    color:var(--muted);
    font-size:11px;
    padding:1px 7px;
    border-radius:999px;
  }
  .tab.active{
    color:var(--text);
    background:var(--bg);
    border-color:var(--border);
    box-shadow:0 -2px 0 var(--mint) inset;
  }
  .tab.active .n{ background:var(--mint-dim); color:var(--mint); }
  .tab:hover{ color:var(--text); }

  .panel-wrap{
    max-width:960px;
    margin:0 auto;
    padding:0 24px;
    border-top:1px solid var(--border);
  }
  .panel{ display:none; padding-top:26px; }
  .panel.active{ display:block; animation:fadeIn .25s ease; }
  @keyframes fadeIn{ from{ opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;} }

  .part-label{
    font-family:var(--mono);
    font-size:12px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.08em;
    margin:26px 0 12px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .part-label::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--border);
  }
  .group-label{
    font-family:var(--display);
    font-weight:600;
    font-size:15px;
    color:var(--violet);
    margin:22px 0 12px;
    padding-left:12px;
    border-left:3px solid var(--violet);
  }

  /* ---------- Cards ---------- */
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    margin-bottom:14px;
    overflow:hidden;
    transition:border-color .15s;
  }
  .card:hover{ border-color:#3c477e; }
  .card.star{ border-left:3px solid var(--amber); }

  .card-head{
    display:flex;
    gap:14px;
    padding:18px 20px;
    align-items:flex-start;
  }
  .qid{
    font-family:var(--mono);
    font-weight:600;
    font-size:13px;
    color:var(--muted);
    background:var(--bg-alt);
    border:1px solid var(--border);
    border-radius:9px;
    padding:4px 9px;
    white-space:nowrap;
    height:fit-content;
  }
  .qtext{
    font-weight:600;
    font-size:16px;
    flex:1;
  }
  .qtext code, .qtext pre{
    font-family:var(--mono);
    background:var(--bg-alt);
    border-radius:6px;
  }
  .qtext pre{
    padding:10px 12px;
    margin:8px 0 0;
    overflow-x:auto;
    font-size:13.5px;
    border:1px solid var(--border);
  }
  .qtext code{ padding:2px 6px; font-size:13.5px; }
  .star-badge{
    color:var(--amber);
    font-size:14px;
    flex-shrink:0;
  }

  .options{
    list-style:none;
    margin:12px 0 0;
    padding:0 20px 4px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
  .opt{
    font-family:var(--body);
    font-size:14.5px;
    background:var(--bg-alt);
    border:1px solid var(--border);
    border-radius:10px;
    padding:8px 12px;
    color:var(--muted);
    display:flex;
    gap:8px;
  }
  .opt b{ color:var(--text); font-family:var(--mono); }
  .opt.correct{
    border-color:var(--mint);
    background:var(--mint-dim);
    color:var(--text);
  }
  .opt pre, .opt code{
    font-family:var(--mono);
    background:none;
    padding:0;
    margin:0;
    color:inherit;
    white-space:pre-wrap;
  }

  .reveal-btn{
    width:100%;
    text-align:left;
    background:none;
    border:none;
    border-top:1px dashed var(--border);
    color:var(--mint);
    font-family:var(--mono);
    font-size:13px;
    font-weight:600;
    padding:12px 20px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:14px;
  }
  .reveal-btn:hover{ background:rgba(94,234,212,0.05); }
  .reveal-btn .chev{ transition:transform .2s ease; }
  .reveal-btn.open .chev{ transform:rotate(180deg); }
  .reveal-btn .lbl-open{ display:none; }
  .reveal-btn.open .lbl-closed{ display:none; }
  .reveal-btn.open .lbl-open{ display:inline; }

  .answer{
    display:grid;
    grid-template-rows:0fr;
    transition:grid-template-rows .35s ease;
    background:var(--bg-alt);
  }
  .answer.open{ grid-template-rows:1fr; }
  .answer-inner{ overflow:hidden; padding:0 20px; }
  .answer.open .answer-inner{ padding:16px 20px 20px; }
  .answer-line{
    display:flex;
    gap:10px;
    align-items:flex-start;
    font-weight:600;
    font-size:15px;
  }
  .answer-line .tick{ font-size:17px; }
  .answer-line.true .tick{ color:var(--mint); }
  .answer-line.false .tick{ color:var(--coral); }
  .answer-mono{
    font-family:var(--mono);
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px;
    padding:2px 8px;
    font-size:14px;
  }
  .explain{
    margin-top:8px;
    color:var(--muted);
    font-size:13.5px;
    padding-left:27px;
  }
  .explain b{ color:var(--text); }

  /* True/False chip layout */
  .tf-chip{
    display:inline-block;
    font-family:var(--mono);
    font-size:12px;
    font-weight:600;
    padding:3px 10px;
    border-radius:999px;
    margin-left:10px;
  }
  .tf-chip.true{ background:var(--mint-dim); color:var(--mint); }
  .tf-chip.false{ background:var(--coral-dim); color:var(--coral); }

  /* Bonus grid */
  .bonus-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  .bonus-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px 18px;
    cursor:pointer;
  }
  .bonus-card:hover{ border-color:var(--violet); }
  .bonus-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .bonus-num{
    font-family:var(--mono);
    color:var(--violet);
    font-size:12px;
    font-weight:700;
  }
  .bonus-q{ font-weight:600; font-size:14.5px; margin-top:6px; }
  .bonus-a{
    margin-top:10px;
    padding-top:10px;
    border-top:1px dashed var(--border);
    font-family:var(--mono);
    font-size:14px;
    color:var(--mint);
    display:none;
  }
  .bonus-a code{ background:none; }
  .bonus-card.open .bonus-a{ display:block; }
  .bonus-hint{
    font-family:var(--mono);
    font-size:11px;
    color:var(--muted);
    margin-top:2px;
  }

  /* ---------- Theory Q&A ---------- */
  .theory-body p{ margin:0 0 10px; font-size:14.5px; }
  .theory-body p:last-child{ margin-bottom:0; }
  .theory-body ul, .theory-body ol{ margin:8px 0; padding-left:22px; font-size:14.5px; }
  .theory-body li{ margin:4px 0; }
  .theory-body table{
    width:100%;
    border-collapse:collapse;
    margin:10px 0;
    font-size:13.5px;
  }
  .theory-body th, .theory-body td{
    border:1px solid var(--border);
    padding:8px 10px;
    text-align:left;
  }
  .theory-body th{ background:var(--surface); color:var(--mint); font-family:var(--mono); }
  .theory-body pre{
    font-family:var(--mono);
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 12px;
    margin:8px 0;
    overflow-x:auto;
    font-size:13.5px;
  }
  .box{
    border-radius:10px;
    padding:10px 14px;
    margin:10px 0;
    font-size:13.5px;
    color:var(--text);
  }
  .box.example{ background:rgba(167,139,250,0.08); border-left:3px solid var(--violet); }
  .box.example b{ color:var(--violet); }
  .box.remember{ background:rgba(255,180,84,0.08); border-left:3px solid var(--amber); }
  .box.remember b{ color:var(--amber); }
  .box p{ margin:0; }

  /* Exam tips banner */
  .tips-banner{
    background:linear-gradient(135deg, rgba(94,234,212,0.08), rgba(167,139,250,0.08));
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px 20px;
    margin-bottom:22px;
  }
  .tips-banner h3{
    font-family:var(--display);
    font-size:16px;
    margin:20px 0 10px;
    color:var(--mint);
  }
  .tips-banner h3:first-child{ margin-top: 0; }
  .tips-banner ul{ margin:0; padding-left:20px; font-size:14px; }
  .tips-banner li{ margin:5px 0; }
  .tips-banner b{ color:var(--amber); }
  .tips-banner p{ margin:12px 0 4px; font-size:14px; }
  .tips-banner p:first-child{ margin-top:0; }
  .tips-banner table{ width:100%; border-collapse:collapse; margin:6px 0 14px; font-size:13px; }
  .tips-banner th, .tips-banner td{ border:1px solid var(--border); padding:6px 9px; text-align:left; }
  .tips-banner th{ background:rgba(255,255,255,0.03); color:var(--mint); font-family:var(--mono); }

  /* Practice list — questions only, no answers available */
  .practice-card{
    display:flex;
    gap:12px;
    align-items:flex-start;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px 18px;
    margin-bottom:10px;
  }
  .practice-num{
    font-family:var(--mono);
    font-size:12.5px;
    color:var(--muted);
    background:var(--bg-alt);
    border:1px solid var(--border);
    border-radius:8px;
    padding:3px 8px;
    flex-shrink:0;
  }
  .practice-q{ font-size:14.5px; font-weight:500; }
  .practice-note{
    font-family:var(--mono);
    font-size:11.5px;
    color:var(--muted);
    text-align:center;
    margin:4px 0 18px;
  }

  /* Program formatting (No answers, rich text) */
  .program-card{
    display:flex;
    gap:12px;
    align-items:flex-start;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px 20px;
    margin-bottom:14px;
  }
  .program-card.star{ border-left:3px solid var(--amber); }
  .program-q { font-size: 14.5px; font-weight: 500; flex:1; }
  .program-q ul { margin: 8px 0; padding-left: 22px; font-size: 14px; }
  .program-q p { margin: 8px 0; }
  .program-q p:first-child { margin-top: 0; }
  .program-q p:last-child { margin-bottom: 0; }
  .program-q table { width:100%; border-collapse:collapse; margin:10px 0; font-size:13.5px; }
  .program-q th, .program-q td { border:1px solid var(--border); padding:8px 10px; text-align:left; }
  .program-q th { background:var(--surface-hi); color:var(--mint); font-family:var(--mono); }
  .program-q code { font-family:var(--mono); background:var(--bg-alt); padding:2px 6px; border-radius:4px; font-size:13px; }

  footer{
    max-width:960px;
    margin:50px auto 0;
    padding:20px 24px;
    color:var(--muted);
    font-family:var(--mono);
    font-size:12.5px;
    border-top:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }

  @media (max-width:640px){
    .options{ grid-template-columns:1fr; }
    .bonus-grid{ grid-template-columns:1fr; }
    .console-bar{ font-size:11px; }
    .theory-body table, .program-q table{ display:block; overflow-x:auto; white-space:nowrap; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="eyebrow">ready to execute</div>
  <h1>Class IX Revision - <span>FA1</span></h1>
  <p class="sub">ICSE Class IX Computer Applications — every MCQ, fill-in-the-blank, true/false, viva, and programming question from your handbook, compiled into one revision run.</p>

  <div class="compile-card">
    <div class="compile-row">
      <span id="compileMsg">Ready to compile...</span>
      <span><span id="compileCount">0</span> / <span id="compileTotal">0</span> revealed</span>
    </div>
    <div class="track"><div class="track-fill" id="trackFill"></div></div>
  </div>
</div>

<div class="tab-bar" id="tabBar"></div>
<div class="panel-wrap" id="panelWrap"></div>

<footer>
  <span>⭐ = highly expected in FA-1</span>
  <span id="footerCount"></span>
</footer>

<script>
/* =========================================================================
   DATA BANK
   ========================================================================= */

const PARTS = [
  {
    label: "Part 1",
    mcq: [
      {q:"Java is a __________ programming language.", star:true,
       options:["Machine","Assembly","High Level","Binary"], correct:2},
      {q:"Which software is prescribed by CISCE for Class IX Computer Applications?", star:true,
       options:["Eclipse","BlueJ","NetBeans","VS Code"], correct:1},
      {q:"Which keyword is used to define a class?", star:true,
       options:["object","new","class","public"], correct:2},
      {q:"Which keyword is used to create an object?", star:true,
       options:["object","class","new","define"], correct:2},
      {q:"Which of the following is NOT a primitive data type?", star:true,
       options:["int","boolean","String","char"], correct:2},
      {q:"Which data type stores decimal values?", star:true,
       options:["int","boolean","double","char"], correct:2},
      {q:"Which data type stores only one character?",
       options:["String","char","int","boolean"], correct:1},
      {q:"Which data type stores only <b>true</b> or <b>false</b>?", star:true,
       options:["boolean","char","float","String"], correct:0},
      {q:"Which symbol ends every Java statement?",
       options:[",",":",";","."], correct:2},
      {q:"Which package contains the Scanner class?", star:true,
       options:["java.io","java.lang","java.util","java.math"], correct:2},
      {q:"Which import statement is used for Scanner?", star:true,
       options:["<pre>import java.io.*;</pre>","<pre>import java.util.*;</pre>","<pre>import java.math.*;</pre>","<pre>import scanner.*;</pre>"], correct:1},
      {q:"Which method accepts an integer from the keyboard?", star:true,
       options:["next()","nextLine()","nextInt()","read()"], correct:2},
      {q:"Which method accepts a decimal number?",
       options:["nextInt()","nextDouble()","next()","nextFloat()"], correct:1},
      {q:"Which operator gives the remainder?", star:true,
       options:["/","%","*","+"], correct:1},
      {q:"Which operator is called the Modulus operator?", star:true,
       options:["%","/","+","*"], correct:0},
      {q:"Which operator is Logical AND?", star:true,
       options:["&","&&","||","!"], correct:1},
      {q:"Which operator is Logical OR?",
       options:["%","||","&&","=="], correct:1},
      {q:"Which operator is Logical NOT?",
       options:["!","%","+","="], correct:0},
      {q:"Which operator is used to compare two values?", star:true,
       options:["=","==","+=","%"], correct:1},
      {q:"Which of the following is a relational operator?", star:true,
       options:["%","&&",">=","||"], correct:2},
      {q:"Math.abs(-25) returns", star:true,
       options:["-25","25","0","Error"], correct:1},
      {q:"Math.sqrt(196) returns", star:true,
       options:["13","12","14","196"], correct:2},
      {q:"Which Math function returns the greater of two numbers?", star:true,
       options:["Math.min()","Math.abs()","Math.max()","Math.pow()"], correct:2},
      {q:"Which Math function returns the smaller number?",
       options:["Math.min()","Math.max()","Math.abs()","Math.ceil()"], correct:0},
      {q:"Math.pow(3,2) returns",
       options:["6","9","5","8"], correct:1},
      {q:"Math.floor(5.9) returns",
       options:["6","5","5.9","Error"], correct:1},
      {q:"Math.ceil(5.1) returns",
       options:["5","6","5.1","Error"], correct:1},
      {q:"Which conditional statement is used for multiple branching?", star:true,
       options:["if","switch","while","do...while"], correct:1},
      {q:"Which keyword is generally used after every case in a switch statement?", star:true,
       options:["stop","continue","break","exit"], correct:2},
      {q:"Java is __________ sensitive.",
       options:["Number","Case","Variable","Operator"], correct:1},
      {q:"Which of the following is an arithmetic operator?",
       options:["&&",">=","+","=="], correct:2},
      {q:"The operator ++ is called",
       options:["Decrement","Increment","Assignment","Logical"], correct:1},
      {q:"Which statement displays output on the screen?",
       options:["<pre>System.out.println();</pre>","<pre>Scanner.nextInt();</pre>","<pre>Math.sqrt();</pre>","<pre>main();</pre>"], correct:0},
      {q:"Which of the following is an assignment operator?",
       options:["+=",">","&&","%"], correct:0},
      {q:"Java is an __________ programming language.", star:true,
       options:["Procedural","Object-Oriented","Machine","Assembly"], correct:1},
    ],
    fillblank: [
      {q:"Java is a __________ programming language.", a:"High-Level"},
      {q:"Java is an __________ programming language.", a:"Object-Oriented"},
      {q:"An __________ is an instance of a class.", a:"Object"},
      {q:"The keyword used to create an object is __________.", a:"new"},
      {q:"The Scanner class belongs to the __________ package.", a:"java.util"},
      {q:"The method used to read an integer is __________.", a:"nextInt()"},
      {q:"Math.max() returns the __________ number.", a:"Greater (or Larger)"},
      {q:"Math.min() returns the __________ number.", a:"Smaller"},
      {q:"Math.sqrt() returns the __________ root.", a:"Square"},
      {q:"Math.abs() returns the __________ value.", a:"Absolute (Positive)"},
      {q:"The operator % is called the __________ operator.", a:"Modulus"},
      {q:"The operator && is called the __________ operator.", a:"Logical AND"},
      {q:"The statement used for multiple branching is __________.", a:"switch"},
      {q:"Every Java statement ends with a __________.", a:"Semicolon (;)"},
      {q:"Java is __________ sensitive.", a:"Case"},
    ],
    truefalse: [
      {q:"Java is case-sensitive.", a:true},
      {q:"BlueJ is an IDE.", a:true},
      {q:"String is a primitive data type.", a:false, ex:"String is a non-primitive (reference) data type."},

    theory: [
      {q:"What is Programming?", star:true,
       body:`<p>Programming is the process of writing a set of instructions (called a <b>program</b>) that tells a computer how to perform a particular task.</p>
             <div class="box example"><b>Example</b><p>A program to calculate the average marks of three subjects.</p></div>
             <div class="box remember"><b>💡 Remember</b><p>Program = Set of Instructions</p></div>`},
      {q:"What is Procedural Programming?", star:true,
       body:`<p>Procedural Programming is a programming approach in which a program is divided into small procedures or functions. The focus is on <b>functions</b> rather than data.</p>
             <p><b>Examples of Procedural Languages</b></p>
             <ul><li>C</li><li>Pascal</li><li>BASIC</li></ul>
             <div class="box example"><b>Example — to prepare tea</b>
               <ul><li>Boil water</li><li>Add tea leaves</li><li>Add sugar</li><li>Add milk</li></ul>
               <p>Each step is treated as a separate procedure.</p>
             </div>`},
      {q:"What is Object-Oriented Programming (OOP)?", star:true,
       body:`<p>Object-Oriented Programming (OOP) is a programming methodology in which a program is organized around <b>objects</b> rather than functions. Objects contain both <b>data</b> and <b>methods</b>.</p>
             <p><b>Examples of OOP Languages</b></p>
             <ul><li>Java</li><li>C++</li><li>Python</li></ul>
             <div class="box example"><b>Real-life Example</b><p>A <b>Car</b> is an object having: Data → Colour, Model, Speed &nbsp;|&nbsp; Methods → Start(), Stop(), Brake()</p></div>`},
      {q:"Why is Java called an Object-Oriented Programming Language?", star:true,
       body:`<p>Java is called an Object-Oriented Programming language because it supports the concept of <b>classes</b> and <b>objects</b>, and follows the four main principles of OOP.</p>`},
      {q:"What are the four principles of Object-Oriented Programming?", star:true,
       body:`<ol><li>Encapsulation</li><li>Data Abstraction</li><li>Inheritance</li><li>Polymorphism</li></ol>
             <div class="box remember"><b>💡 Memory Trick — E A I P</b><p>Encapsulation · Abstraction · Inheritance · Polymorphism</p></div>`},
      {q:"What is Encapsulation?", star:true,
       body:`<p>Encapsulation is the process of combining <b>data (variables)</b> and the <b>methods (functions)</b> that operate on that data into a single unit called a <b>class</b>. It also protects data from unauthorized access.</p>
             <div class="box example"><b>Real-life Example — a Bank Account</b><p>You cannot directly change your account balance. You use methods such as Deposit() and Withdraw().</p></div>`},
      {q:"What is Data Abstraction?", star:true,
       body:`<p>Data Abstraction means showing only the necessary information to the user while hiding the internal implementation.</p>
             <div class="box example"><b>Real-life Example — an ATM machine</b><p>You can withdraw money, deposit money, and check balance — but you do not know how the machine processes these operations internally.</p></div>`},
      {q:"What is Inheritance?", star:true,
       body:`<p>Inheritance is the process by which one class acquires the properties and methods of another class. It helps in <b>code reusability</b>.</p>
             <div class="box example"><b>Example</b><p>Animal → Dog<br>The Dog class inherits the properties of the Animal class.</p></div>`},
      {q:"What is Polymorphism?", star:true,
       body:`<p>Polymorphism means <b>one name, many forms</b>. The same method can perform different tasks depending on how it is used.</p>
             <div class="box example"><b>Example — the "+" operator</b>
               <pre>5 + 3</pre><p>performs addition, while</p>
               <pre>"ICSE" + "2026"</pre><p>joins two strings. Thus, the same operator performs different tasks.</p>
             </div>`},
      {q:"What is Message Passing?", star:true,
       body:`<p>Message Passing is the process by which one object communicates with another object by calling its methods.</p>`},
      {q:"What is a Class?", star:true,
       body:`<p>A Class is a blueprint or template used to create objects. It contains:</p>
             <ul><li>Data (Variables)</li><li>Methods (Functions)</li></ul>
             <div class="box example"><b>Example</b><p><code>Car</code> is a Class.</p></div>`},
      {q:"What is an Object?", star:true,
       body:`<p>An Object is an instance of a class. It occupies memory and can access the data and methods of the class.</p>
             <div class="box example"><b>Example</b><p>Honda City, BMW, Swift are objects of the Car class.</p></div>`},
      {q:"Differentiate between Class and Object.", star:true,
       body:`<table><tr><th>Class</th><th>Object</th></tr>
             <tr><td>Blueprint</td><td>Instance of a class</td></tr>
             <tr><td>Logical entity</td><td>Physical entity</td></tr>
             <tr><td>Does not occupy memory</td><td>Occupies memory</td></tr>
             <tr><td>Used to create objects</td><td>Created from a class</td></tr></table>`},
      {q:"Give a real-life example of Class and Object.", star:true,

             <tr><td>Mobile</td><td>Samsung, Apple</td></tr>
             <tr><td>Book</td><td>English Book, Science Book</td></tr></table>`},
      {q:"What are the advantages of Object-Oriented Programming?", star:true,
       body:`<ol><li>Code Reusability</li><li>Easy Maintenance</li><li>Better Security</li><li>Easy Debugging</li><li>Faster Development</li><li>Modular Programming</li><li>Easy to Modify Programs</li></ol>`},
      {q:"Differentiate between Procedural Programming and Object-Oriented Programming.", star:true,

      {q:"What is Java?", star:true,
       body:`<p>Java is a high-level, object-oriented, platform-independent programming language developed by <b>Sun Microsystems</b>. It is now owned by <b>Oracle Corporation</b>.</p>`},

      {q:"What is Platform Independence?", star:true,

      {q:"What are Keywords?", star:true,

const SECTIONS = [
  { key:"mcq",       title:"MCQs",            icon:"A" },
  { key:"fillblank", title:"Fill in Blanks",  icon:"B" },
  { key:"truefalse", title:"True / False",    icon:"C" },
  { key:"bonus",     title:"Viva / Bonus",    icon:"★" },
  { key:"theory",    title:"Theory Q&A",      icon:"T" },
  { key:"practice",  title:"2-Mark Practice", icon:"P", countsInProgress:false },
  { key:"programs",  title:"Programs",        icon:"&lt;/&gt;", countsInProgress:false }
];

let revealedCount = 0;
let totalCount = 0;

function letter(i){ return "abcd"[i]; }

function buildOptionHtml(opt){
  return opt.startsWith("<pre>") ? opt : opt;
}

function makeMcqCard(item, gid){
  const card = document.createElement("div");
  card.className = "card" + (item.star ? " star" : "");
  const optsHtml = item.options.map((opt,i)=>{
    const isCorrect = i === item.correct;
    return `<li class="opt" data-correct="${isCorrect}"><b>${letter(i)})</b> ${buildOptionHtml(opt)}</li>`;
  }).join("");

  card.innerHTML = `
    <div class="card-head">
      <span class="qid">${gid}</span>
      <div class="qtext">${item.q} ${item.star ? '<span class="star-badge">⭐</span>' : ''}</div>
    </div>
    <ul class="options">${optsHtml}</ul>
    <button class="reveal-btn">
      <span><span class="lbl-closed">Reveal answer</span><span class="lbl-open">Hide answer</span></span>
      <span class="chev">⌄</span>
    </button>
    <div class="answer"><div class="answer-inner">
      <div class="answer-line true"><span class="tick">✅</span><span>${letter(item.correct)}) ${item.options[item.correct].replace(/<\/?pre>/g,"")}</span></div>
    </div></div>
  `;
  wireReveal(card, gid);
  return card;
}

function makeFillCard(item, gid){
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="card-head">
      <span class="qid">${gid}</span>
      <div class="qtext">${item.q}</div>
    </div>
    <button class="reveal-btn">
      <span><span class="lbl-closed">Reveal answer</span><span class="lbl-open">Hide answer</span></span>
      <span class="chev">⌄</span>
    </button>
    <div class="answer"><div class="answer-inner">
      <div class="answer-line true"><span class="tick">✅</span><span class="answer-mono">${item.a}</span></div>
    </div></div>
  `;
  wireReveal(card, gid);
  return card;
}

function makeTfCard(item, gid){
  const card = document.createElement("div");
  card.className = "card";
  const chip = item.a ? '<span class="tf-chip true">TRUE</span>' : '<span class="tf-chip false">FALSE</span>';
  card.innerHTML = `
    <div class="card-head">
      <span class="qid">${gid}</span>
      <div class="qtext">${item.q}</div>
    </div>
    <button class="reveal-btn">
      <span><span class="lbl-closed">Reveal answer</span><span class="lbl-open">Hide answer</span></span>
      <span class="chev">⌄</span>
    </button>
    <div class="answer"><div class="answer-inner">
      <div class="answer-line ${item.a ? 'true':'false'}">
        <span class="tick">${item.a ? '✅' : '❌'}</span><span>${item.a ? 'True' : 'False'}</span>${chip}
      </div>
      ${item.ex ? `<div class="explain"><b>Explanation:</b> ${item.ex}</div>` : ''}
    </div></div>
  `;
  wireReveal(card, gid);
  return card;
}

function makeTheoryCard(item, gid){
  const card = document.createElement("div");
  card.className = "card" + (item.star ? " star" : "");
  card.innerHTML = `
    <div class="card-head">
      <span class="qid">Q${gid}</span>
      <div class="qtext">${item.q} ${item.star ? '<span class="star-badge">⭐</span>' : ''}</div>
    </div>
    <button class="reveal-btn">
      <span><span class="lbl-closed">Reveal answer</span><span class="lbl-open">Hide answer</span></span>
      <span class="chev">⌄</span>
    </button>
    <div class="answer"><div class="answer-inner theory-body">
      ${item.body}
    </div></div>
  `;
  wireReveal(card, gid);
  return card;
}

function makePracticeCard(item, gid){
  const card = document.createElement("div");
  card.className = "practice-card";
  card.innerHTML = `
    <span class="practice-num">Q${gid}</span>
    <span class="practice-q">${item.q}</span>
  `;
  return card;
}

function makeProgramCard(item, gid){
  const card = document.createElement("div");
  card.className = "program-card" + (item.star ? " star" : "");
  card.innerHTML = `
    <span class="practice-num">Q${gid}</span>
    <div class="program-q">${item.q} ${item.star ? '<span class="star-badge">⭐</span>' : ''}</div>
  `;
  return card;
}

function wireReveal(card, gid){
  const btn = card.querySelector(".reveal-btn");
  const ans = card.querySelector(".answer");
  let seen = false;
  btn.addEventListener("click", ()=>{
    const opening = !ans.classList.contains("open");
    ans.classList.toggle("open");
    btn.classList.toggle("open");
    if(opening){
      const opts = card.querySelectorAll(".opt");
      opts.forEach(o=>{ if(o.dataset.correct === "true") o.classList.add("correct"); });
      if(!seen){ seen = true; revealedCount++; updateProgress(); }
    }
  });
}

function buildBonusCard(item, gid){
  const card = document.createElement("div");
  card.className = "bonus-card";
  card.innerHTML = `
    <div class="bonus-top">
      <div>
        <div class="bonus-num">Q${gid}</div>
        <div class="bonus-q">${item.q}</div>
        <div class="bonus-hint">tap to reveal</div>
      </div>
    </div>
    <div class="bonus-a"><code>${item.a}</code></div>
  `;
  let seen = false;
  card.addEventListener("click", ()=>{
    const opening = !card.classList.contains("open");
    card.classList.toggle("open");
    if(opening && !seen){ seen = true; revealedCount++; updateProgress(); }
  });
  return card;
}

function updateProgress(){
  document.getElementById("compileCount").textContent = revealedCount;
  document.getElementById("compileTotal").textContent = totalCount;
  const pct = totalCount ? Math.round((revealedCount/totalCount)*100) : 0;
  document.getElementById("trackFill").style.width = pct + "%";
  const msg = document.getElementById("compileMsg");
  if(pct === 0) msg.textContent = "Ready to compile...";
  else if(pct < 30) msg.textContent = "Warming up the JVM...";
  else if(pct < 70) msg.textContent = "Compiling nicely, keep going...";
  else if(pct < 100) msg.textContent = "Almost there, no errors found...";
  else msg.textContent = "✅ Build Successful — full revision complete!";
}

function renderAll(){
  const tabBar = document.getElementById("tabBar");
  const panelWrap = document.getElementById("panelWrap");

  SECTIONS.forEach((sec, si)=>{
    let sectionTotal = 0;
    PARTS.forEach(p=> sectionTotal += (p[sec.key] || []).length);
    if(sec.countsInProgress !== false) totalCount += sectionTotal;

    const tab = document.createElement("div");
    tab.className = "tab" + (si === 0 ? " active" : "");
    tab.dataset.target = sec.key;
    tab.innerHTML = `${sec.icon} ${sec.title} <span class="n">${sectionTotal}</span>`;
    tab.addEventListener("click", ()=>{
      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById("panel-"+sec.key).classList.add("active");
    });
    tabBar.appendChild(tab);

    const panel = document.createElement("div");
    panel.className = "panel" + (si === 0 ? " active" : "");
    panel.id = "panel-"+sec.key;

    if(sec.key === "practice"){
      const note = document.createElement("div");
      note.className = "practice-note";
      note.textContent = "These are recall-practice prompts — answers aren't provided; use them to test yourself against the Theory Q&A above.";
      panel.appendChild(note);
    } else if (sec.key === "programs"){
      const note = document.createElement("div");
      note.className = "practice-note";
      note.textContent = "Write complete Java programs using BlueJ. Ensure proper indentation and meaningful messages.";
      panel.appendChild(note);
    }

    let gCounter = 0;
    PARTS.forEach(part=>{
      const items = part[sec.key] || [];
      if(!items.length) return;
      const label = document.createElement("div");
      label.className = "part-label";
      label.textContent = part.label;
      panel.appendChild(label);

      if(part.tips && (sec.key === "theory" || sec.key === "programs")){
        const banner = document.createElement("div");
        banner.className = "tips-banner";
        const title = part.tipsTitle || `⭐ Exam Tips — ${part.label}`;
        banner.innerHTML = `<h3>${title}</h3>${part.tips}`;
        panel.appendChild(banner);
      }

      if(sec.key === "bonus"){
        const grid = document.createElement("div");
        grid.className = "bonus-grid";
        items.forEach(item=>{
          gCounter++;
          grid.appendChild(buildBonusCard(item, gCounter));
        });
        panel.appendChild(grid);
      } else {
        let currentGroup = null;
        items.forEach(item=>{
          gCounter++;
          if((sec.key === "theory" || sec.key === "programs") && item.group && item.group !== currentGroup){
            currentGroup = item.group;
            const gLabel = document.createElement("div");
            gLabel.className = "group-label";
            gLabel.textContent = currentGroup;
            panel.appendChild(gLabel);
          }
          let cardEl;
          if(sec.key === "mcq") cardEl = makeMcqCard(item, gCounter);
          else if(sec.key === "fillblank") cardEl = makeFillCard(item, gCounter);
          else if(sec.key === "truefalse") cardEl = makeTfCard(item, gCounter);
          else if(sec.key === "theory") cardEl = makeTheoryCard(item, gCounter);
          else if(sec.key === "programs") cardEl = makeProgramCard(item, gCounter);
          else cardEl = makePracticeCard(item, gCounter);
          panel.appendChild(cardEl);
        });
      }
    });

    panelWrap.appendChild(panel);
  });

  document.getElementById("compileTotal").textContent = totalCount;
  document.getElementById("footerCount").textContent = `${totalCount} questions loaded across ${PARTS.length} part${PARTS.length>1?'s':''}`;
}

renderAll();
</script>
